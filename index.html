<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Study Jams '25 Certificate — GDG on Campus</title>
  <meta name="description"
    content="Get your Cloud Study Jams '25 completion certificate from Google Developer Group on Campus." />
  <meta property="og:title" content="Cloud Study Jams '25 Certificate — GDG on Campus" />
  <meta property="og:description" content="Search for your name and download your Cloud Study Jams '25 certificate." />
  <meta property="og:type" content="website" />
  <!-- Favicon -->
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />

  <!-- Preload critical assets -->
  <link rel="preload" as="font" href="assets/great-vibes-names-only.woff2" type="font/woff2" crossorigin />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Vanta.js dependencies -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js" crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds.min.js" crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>

  <!-- Application scripts -->
  <script defer src="participants.js"></script>
  <script defer src="app.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Splash Loading Screen -->
  <div id="loader" class="loader">
    <div class="spinner"></div>
    <div class="loader-text">- Do participate in the GDG Ideathon - prizes worth 4k! 🤑</div>
  </div>

  <!-- Vanta.js background container -->
  <div id="vanta-bg"></div>

  <!-- Floating Logos -->
  <div class="floating-logos">
    <img src="assets/gdg-logo.webp" alt="GDG on Campus" class="floating-logo floating-gdg" />
    <img src="assets/cloud-logo2.webp" alt="Google Cloud" class="floating-logo floating-cloud" />
  </div>

  <!-- Main content wrapper -->
  <main id="app">

    <!-- ===== SEARCH VIEW ===== -->
    <section id="search-view" class="view active">
      <div class="search-container">
        <!-- Logo & Title -->
        <div class="logo-section">

          <h1 class="title">
            <span class="title-gdg">Cloud Study Jams '25</span>
          </h1>
          <img src="assets/text-1774437227277.png" alt="Thank you for participating" class="thank-you-img" />
        </div>

        <!-- Search Bar -->
        <div class="search-bar-wrapper">
          <div class="search-bar" id="search-bar">
            <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20">
              <path fill="#9AA0A6"
                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
            </svg>
            <input type="text" id="search-input" placeholder="Search your name..." autocomplete="off"
              spellcheck="false" />
            <button id="clear-btn" class="clear-btn hidden" aria-label="Clear">
              <svg viewBox="0 0 24 24" width="20" height="20">
                <path fill="#70757A"
                  d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
              </svg>
            </button>
          </div>

          <!-- Autocomplete Dropdown -->
          <ul id="autocomplete-list" class="autocomplete-list hidden"></ul>
        </div>

        <!-- Search Button -->
        <div class="search-actions">
          <button id="search-btn" class="btn-search">
            <span>Get My Certificate</span>
            <svg viewBox="0 0 24 24" width="18" height="18" style="margin-left:6px">
              <path fill="currentColor" d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z" />
            </svg>
          </button>
        </div>

        <!-- Error Message -->
        <div id="error-msg" class="error-msg hidden">
          <svg viewBox="0 0 24 24" width="16" height="16" style="margin-right:6px;flex-shrink:0">
            <path fill="#EA4335"
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
          </svg>
          <span>Name not found. Please check the spelling and try again.</span>
        </div>

      </div>
    </section>

    <!-- ===== CERTIFICATE VIEW ===== -->
    <section id="cert-view" class="view">
      <div class="cert-container">
        <div class="cert-card">
          <canvas id="cert-canvas"></canvas>
        </div>

        <div class="cert-actions">
          <button id="download-btn" class="btn-download">
            <svg viewBox="0 0 24 24" width="20" height="20" style="margin-right:8px">
              <path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
            </svg>
            <span>Download Certificate</span>
          </button>
          <button id="back-btn" class="btn-back">
            <svg viewBox="0 0 24 24" width="20" height="20" style="margin-right:6px">
              <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
            </svg>
            <span>Search Again</span>
          </button>
        </div>

      </div>
    </section>

  </main>
</body>

</html>
